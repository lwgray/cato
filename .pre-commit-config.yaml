default_language_version:
  python: python3.12

fail_fast: false

exclude: |
  (?x)^(
    .git|
    .hg|
    .mypy_cache|
    .tox|
    .venv|
    _build|
    buck-out|
    build|
    dist|
    node_modules|
    dashboard/node_modules
  )

repos:
  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.1
    hooks:
      - id: mypy
        args: ["--config-file=pyproject.toml"]
        additional_dependencies:
          - types-aiofiles
          - types-requests
          - pydantic
        exclude: ^(tests/|docs/)

  # Docstring validation
  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: ["--config=pyproject.toml"]
        exclude: ^(tests/|docs/|setup\.py)

  # Code formatting
  - repo: https://github.com/psf/black
    rev: 26.3.0
    hooks:
      - id: black
        language_version: python3.12
        args: ["--line-length=88"]

  # Import sorting
  - repo: https://github.com/PyCQA/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=88"]

  # Linting
  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args: ["--max-line-length=88", "--extend-ignore=E203"]
        exclude: ^(tests/|docs/)

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: ^(tests/|\.git/|\.env\.example)

  # General checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-json
      - id: check-toml
      - id: debug-statements
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Custom local hooks
  - repo: local
    hooks:
      - id: no-naive-datetime
        name: No naive datetime
        entry: 'datetime\.now\(\s*\)'
        language: pygrep
        types: [python]
        exclude: ^tests/
      - id: changelog-reminder
        name: Changelog reminder
        entry: bash -c 'if git diff --cached --name-only | grep -q "^cato_src/\|^backend/"; then echo "Remember to update CHANGELOG.md if this is a user-facing change"; fi'
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
